{% load staticfiles %}

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>えむにすと</title>
    <script type="text/javascript" src="{% static 'js/drawing_touch.js' %}"></script>
</head>

<body>
    <canvas id="canvas1" width={{ cvssize }} height={{ cvssize }} style="background:#EFECE5"></canvas>
    <form action="" method="post">
        {% csrf_token %}
        <button style="HEIGHT:100px;font-size:30px;
        border:none;background:#FFFFFF;color:##3f3f3f;">
        {% if img %}かいた数字は<span style="font-size:50pt;">{{ img }}</span>ですか？
        {% else %}数字をかいてください{% endif %}
        </button>
        <input id="button1" type="hidden" name="img">
        <input id="button2" type="hidden" name="img">
    </form>
<p>cnn: {{ list_cnn }}</p>
<p>dnn: {{ list_dnn }}</p>
</body>
</html>
